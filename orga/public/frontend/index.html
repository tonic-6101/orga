<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Orga - Project Management</title>
    <meta name="description" content="Orga - Project Management System" />
    <link rel="icon" type="image/svg+xml" href="/assets/orga/images/orga-icon.svg" />
    <script type="module" crossorigin src="/assets/orga/frontend/assets/main-RUEyGdwk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/orga/frontend/assets/main-d5NZNONT.css">
  </head>
  <body>
    <script>
      // Prevent flash of wrong theme/color-mode before Vue loads
      (function() {
        var stored = localStorage.getItem('orga-theme');
        var isDark = stored === 'dark' ||
          (!stored || stored === 'auto') && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) document.documentElement.classList.add('dark');
        // Color mode: neutral removes app brand colors
        var cm = localStorage.getItem('color-mode');
        if (cm === 'neutral') document.documentElement.setAttribute('data-color-mode', 'neutral');
      })();
    </script>
    <div id="app" class="h-screen"></div>
    <div id="modals"></div>
    <div id="popovers"></div>
    <script>
      window.csrf_token = "{{ csrf_token }}"
    </script>
  
          <script>
              {% for key in boot %}
              window["{{ key }}"] = {{ boot[key] | tojson }};
              {% endfor %}
          </script>
          </body>
          
</html>
